<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
		<title>HackerWeb</title>
		<meta name="apple-mobile-web-app-title" content="HackerWeb" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="color-scheme" id="meta-color-scheme" content="dark light" />
		<meta name="theme-color" content="#fff" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#1c1c1e" media="(prefers-color-scheme: dark)" />
		<link rel="shortcut icon" href="/icons/favicon.ico" />
		<link rel="shortcut icon" sizes="196x196" href="/icons/icon-196.png" />
		<link rel="apple-touch-icon-precomposed" href="/icons/icon-180.png" />
		<link rel="manifest" href="/manifest.json" />
		<link rel="stylesheet" href="/src/css/hw.css" />
	</head>
	<body>
		<div class="view hidden" id="view-home">
			<header>
				<a href="#/about" class="header-button header-button-left">
					<button type="button">About</button>
				</a>
				<h1 style="margin: 0 65px">HackerWeb</h1>
				<a
					class="header-button header-button-icon header-button-right"
					id="view-home-refresh"
				>
					<button type="button"><i class="icon-refresh">Refresh</i></button>
				</a>
			</header>
			<div class="scroll">
				<section></section>
			</div>
		</div>
		<div class="view hidden shaded" id="view-comments">
			<header>
				<a href="#/" class="header-button header-button-left header-back-button">
					<button type="button">News</button>
				</a>
				<h1 style="margin: 0 75px"></h1>
			</header>
			<div class="scroll">
				<section></section>
			</div>
		</div>
		<div class="view hidden shaded" id="view-about">
			<header>
				<a href="#/" class="header-button header-button-left">
					<button type="button">Close</button>
				</a>
				<h1>About</h1>
			</header>
			<div class="scroll striped">
				<section>
					<div class="grouped-tableview cf" id="hw-appearance-container" hidden>
						<div class="inline-block">Appearance</div>
						<div class="inline-block" id="hw-appearance">
							<label
								><input name="hw-appearance" type="radio" value="light" /> Light</label
							>
							<label
								><input name="hw-appearance" type="radio" value="dark" /> Dark</label
							>
							<label hidden
								><input name="hw-appearance" type="radio" value="auto" /> Auto</label
							>
						</div>
					</div>
					<div class="grouped-tableview cf">
						<div class="inline-block">Hide stories with no comments</div>
						<div class="inline-block" id="hw-hide-no-comments">
							<label
								><input name="hw-hide-no-comments" type="radio" value="on" /> On</label
							>
							<label
								><input name="hw-hide-no-comments" type="radio" value="off" />
								Off</label
							>
						</div>
					</div>
					<ul class="grouped-tableview grouped-tableview-links">
						<li>
							<a href="https://news.ycombinator.com/" target="_blank" class="disclosure"
								>Hacker News homepage</a
							>
						</li>
						<li>
							<a
								href="https://github.com/duebbert/hackerweb"
								target="_blank"
								class="disclosure"
								>HackerWeb on GitHub</a
							>
						</li>
					</ul>
					<p class="foot-label">
						Based on
						<a href="https://github.com/cheeaun/hackerweb" target="_blank">HackerWeb</a>
						by Lim Chee Aun.<br />Not affiliated with Hacker News or YCombinator.
					</p>
				</section>
			</div>
		</div>
		<script type="module" src="/src/js/main.js"></script>
		<script>
			if ('serviceWorker' in navigator) {
				navigator.serviceWorker
					.register('/service-worker.js')
					.catch(function () {
						/* ignored */
					})
			}
			if (/preview/i.test(location.search)) {
				document.querySelector('.scroll').style.height = 'auto'
			}
		</script>
	</body>
</html>
